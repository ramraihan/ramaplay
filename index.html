<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rama Play</title>
    <style>
        :root {
            --bg-body: #f4f7f6;
            --bg-card: #ffffff;
            --text-main: #1a202c;
            --text-muted: #718096;
            --border-color: #edf2f7;
            --header-shadow: rgba(0,0,0,0.04);
        }

        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --header-shadow: rgba(0,0,0,0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            padding-bottom: 60px;
            min-height: 100vh;
        }

        .main-header {
            background-color: var(--bg-card);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 10px var(--header-shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo {
            font-size: 22px;
            font-weight: 800;
            color: #00a3e0;
        }

        .theme-toggle-btn {
            background: #00a3e0;
            color: #ffffff;
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 10px rgba(0, 163, 224, 0.2);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px;
        }

        .search-container {
            margin: 15px 0;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            outline: none;
            background-color: var(--bg-card);
            color: var(--text-main);
        }

        .search-input:focus {
            border-color: #00a3e0;
            box-shadow: 0 0 0 3px rgba(0, 163, 224, 0.15);
        }

        .category-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 5px 0 15px 0;
            scrollbar-width: none;
        }

        .category-scroll::-webkit-scrollbar {
            display: none;
        }

        .category-item {
            background-color: var(--bg-card);
            color: var(--text-muted);
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 13.5px;
            font-weight: 700;
            border: 1px solid var(--border-color);
            cursor: pointer;
            white-space: nowrap;
        }

        .category-item.active {
            background: #00a3e0;
            color: #ffffff;
            border-color: #00a3e0;
            box-shadow: 0 4px 12px rgba(0, 163, 224, 0.2);
        }

        .status-text {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-muted);
            margin: 10px 0 20px 5px;
        }

        /* KHUSUS INDONESIA/HP: Memaksa tampilan tepat 3 kotak ke samping */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        @media (min-width: 768px) {
            .games-grid { grid-template-columns: repeat(4, 1fr); }
        }
        @media (min-width: 1024px) {
            .games-grid { grid-template-columns: repeat(6, 1fr); }
        }

        .game-card {
            background-color: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            padding: 8px;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            cursor: pointer;
        }

        .game-card:hover {
            transform: translateY(-4px);
            border-color: #00a3e0;
        }

        .img-box {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 12px;
            overflow: hidden;
            background: #e2e8f0;
            position: relative;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .game-title {
            font-size: 11px;
            font-weight: 700;
            margin-top: 8px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <div class="main-header">
        <div class="header-logo">🎮 Rama Play</div>
        <button class="theme-toggle-btn" onclick="toggleTheme()" id="themeBtn">🌙 Gelap</button>
    </div>

    <div class="container">
        
        <div class="search-container">
            <input type="text" id="searchBar" class="search-input" placeholder="Cari game kesukaanmu di sini..." oninput="searchGames()">
        </div>

        <div class="category-scroll">
            <button class="category-item active" onclick="changeCategory('all', this)">Semua Game</button>
            <button class="category-item" onclick="changeCategory('arcade', this)">🕹️ Arkade</button>
            <button class="category-item" onclick="changeCategory('action', this)">⚔️ Aksi</button>
            <button class="category-item" onclick="changeCategory('adventure', this)">🤠 Petualangan</button>
            <button class="category-item" onclick="changeCategory('puzzle', this)">🧩 Puzzle</button>
            <button class="category-item" onclick="changeCategory('racing', this)">🏎️ Balapan</button>
            <button class="category-item" onclick="changeCategory('sports', this)">⚽ Olahraga</button>
            <button class="category-item" onclick="changeCategory('strategy', this)">🧠 Strategi</button>
        </div>

        <div class="status-text" id="loadStatus">Memproses database Rama Play...</div>
        
        <div class="games-grid" id="gamesContainer"></div>

    </div>

    <script>
        let currentActiveCategory = 'all';

        // 24 GAME UTUH SESUAI STRUKTUR RESMI GAMEPIX
        const databaseGames = [
            { title: "Defend The Tank", category: "action", id: "defend-the-tank" },
            { title: "Knight 360", category: "action", id: "knight-360" },
            { title: "Sierras Flight", category: "action", id: "sierras-flight" },
            { title: "Stickman War", category: "action", id: "stickman-war" },
            
            { title: "Drift Cup Racing", category: "racing", id: "drift-cup-racing" },
            { title: "Desert Road", category: "racing", id: "desert-road" },
            { title: "Super Racing", category: "racing", id: "mini-race-rush" },
            { title: "Moto X3M Pool Party", category: "racing", id: "moto-x3m-4-pool-party" },

            { title: "Unblock That", category: "puzzle", id: "unblock-that" },
            { title: "Merge Cakes", category: "puzzle", id: "merge-cakes" },
            { title: "TenTrix", category: "puzzle", id: "tentrix" },
            { title: "2048 Dragon", category: "puzzle", id: "2048-dragon" },

            { title: "Foot Chinko", category: "sports", id: "foot-chinko" },
            { title: "Classic Bowling", category: "sports", id: "classic-bowling" },
            { title: "Basketball Stars", category: "sports", id: "basketball-stars" },
            { title: "Penalty Kick Wiz", category: "sports", id: "penalty-kick-wiz" },

            { title: "Swoop", category: "arcade", id: "swoop" },
            { title: "Neon Tower", category: "arcade", id: "neon-tower" },
            { title: "Pac-Xon", category: "arcade", id: "pac-xon" },
            { title: "Tap Tap Dash", category: "arcade", id: "tap-tap-dash" },

            { title: "Slime Rush TD", category: "strategy", id: "slime-rush-td" },
            { title: "Ludo Legend", category: "strategy", id: "ludo-legend" },
            { title: "Gladiators", category: "strategy", id: "gladiators" },
            { title: "Subway Stone", category: "adventure", id: "subway-stone" }
        ];

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const btn = document.getElementById('themeBtn');
            if (currentTheme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                btn.innerHTML = '🌙 Gelap';
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                btn.innerHTML = '☀️ Terang';
                localStorage.setItem('theme', 'dark');
            }
        }

        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.getElementById('themeBtn').innerHTML = '☀️ Terang';
        }

        function displayFilteredGames() {
            const container = document.getElementById('gamesContainer');
            container.innerHTML = '';

            let filteredList = databaseGames;
            if (currentActiveCategory !== 'all') {
                filteredList = databaseGames.filter(game => game.category === currentActiveCategory);
            }

            filteredList.forEach(game => {
                const card = document.createElement('div');
                card.className = "game-card";
                card.style.display = 'flex';
                
                const gameTitleText = game.title;
                card.setAttribute('data-name', gameTitleText.toLowerCase());
                
                // FIXED URL INTEGRASI UTAMA GAMEPIX LIVE - ANTI ERROR 404
                const monetizationUrl = `https://www.gamepix.com/live/${game.id}?sid=1AAA1`;
                
                card.onclick = () => { 
                    window.location.href = monetizationUrl;
                };

                // FIXED URL GAMBAR LANGSUNG DARI SERVER KATA KUNCI UTAMA Tanpa Proxy Pihak Ketiga
                const officialImage = `https://images.gamepix.com/${game.id}/thumbnail/small.png`;

                card.innerHTML = `
                    <div class="img-box">
                        <img src="${officialImage}" alt="${gameTitleText}" loading="lazy">
                    </div>
                    <div class="game-title">${gameTitleText}</div>
                `;
                container.appendChild(card);
            });

            document.getElementById('loadStatus').innerText = `Menampilkan ${filteredList.length} game seru, siap dimainkan!`;
        }

        function searchGames() {
            const searchKeyword = document.getElementById('searchBar').value.toLowerCase().trim();
            const allCards = document.querySelectorAll('.game-card');
            let visibleCount = 0;
            
            allCards.forEach(card => {
                const name = card.getAttribute('data-name');
                if(name.includes(searchKeyword)) {
                    card.style.display = 'flex';
                    visibleCount++;
                } else {
                    card.style.display = 'none';
                }
            });
            document.getElementById('loadStatus').innerText = `Ditemukan ${visibleCount} game cocok`;
        }

        function changeCategory(categoryName, element) {
            document.querySelectorAll('.category-item').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            currentActiveCategory = categoryName;
            document.getElementById('searchBar').value = '';
            displayFilteredGames();
        }

        // Jalankan otomatis untuk memuat semua 24 game pertama kali halaman dibuka
        displayFilteredGames();
    </script>

</body>
</html>
