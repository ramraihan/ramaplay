<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rama Play</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* Latar Belakang Gradasi Biru Cerah & Putih Segar */
        body {
            background: linear-gradient(135px, #d2f3fc 0%, #f4fdf8 50%, #ffffff 100%);
            background-attachment: fixed;
            color: #005f80;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Header Elegan dengan Efek Teks Timbul */
        .header {
            padding: 20px 15px 10px 15px;
            font-size: 28px;
            font-weight: 900;
            text-align: center;
            color: #00a3e0;
            text-shadow: 0 2px 4px rgba(0, 163, 224, 0.1);
            letter-spacing: 0.5px;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 0 15px 15px 15px;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
        }

        /* Kotak Menu Atas Melengkung Sempurna */
        .navigation-panel {
            background: #ffffff;
            padding: 16px;
            border-radius: 24px;
            margin-bottom: 15px;
            box-shadow: 0 8px 24px rgba(0, 163, 224, 0.06);
            border: 2px solid #b3edff;
        }

        /* Kolom Pencarian Dinamis */
        .search-wrapper {
            position: relative;
            margin-bottom: 14px;
        }

        .search-input {
            width: 100%;
            padding: 13px 20px;
            border: 2px solid #e1f7fc;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 600;
            outline: none;
            color: #333;
            background-color: #fafefe;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: #00a3e0;
            background-color: #ffffff;
            box-shadow: 0 0 10px rgba(0, 163, 224, 0.15);
        }

        /* List Kategori Geser Otomatis */
        .categories-wrapper {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
        }

        .categories-wrapper::-webkit-scrollbar {
            display: none;
        }

        .category-tab {
            background: #e6f8fd;
            color: #007ba8;
            padding: 9px 18px;
            border-radius: 50px;
            font-size: 13.5px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .category-tab:hover {
            background: #b3f0ff;
            transform: translateY(-1px);
        }

        .category-tab.active {
            background: #00a3e0;
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(0, 163, 224, 0.25);
        }

        /* Bingkai Utama Penampil Game (Iframe) */
        .game-display-area {
            flex: 1;
            background: #ffffff;
            border-radius: 28px;
            border: 2px solid #b3edff;
            box-shadow: 0 10px 30px rgba(0, 95, 128, 0.05);
            overflow: hidden;
            min-height: 70vh;
            position: relative;
        }

        .game-iframe {
            width: 100%;
            height: 100%;
            border: none;
            min-height: 70vh;
            display: block;
        }
    </style>
</head>
<body>

    <div class="header">🎮 Rama Play</div>

    <div class="main-container">
        
        <div class="navigation-panel">
            <div class="search-wrapper">
                <input type="text" id="gameSearch" class="search-input" placeholder="Cari game seru langsung di sini..." onkeypress="handleSearchSubmit(event)">
            </div>
            
            <div class="categories-wrapper">
                <button class="category-tab active" onclick="switchGameFeed('all', this)">Semua Game</button>
                <button class="category-tab" onclick="switchGameFeed('arcade', this)">🕹️ Arkade</button>
                <button class="category-tab" onclick="switchGameFeed('action', this)">⚔️ Aksi</button>
                <button class="category-tab" onclick="switchGameFeed('strategy', this)">🧠 Strategi</button>
                <button class="category-tab" onclick="switchGameFeed('puzzle', this)">🧩 Puzzle</button>
                <button class="category-tab" onclick="switchGameFeed('racing', this)">🏎️ Balapan</button>
                <button class="category-tab" onclick="switchGameFeed('sports', this)">⚽ Olahraga</button>
                <button class="category-tab" onclick="switchGameFeed('girls', this)">👑 Perempuan</button>
            </div>
        </div>

        <div class="game-display-area">
            <iframe 
                id="gamePixFrame" 
                class="game-iframe" 
                src="https://www.gamepix.com/showcase?sid=1AAA1" 
                allow="autoplay; fulfill-refresh; payment">
            </iframe>
        </div>

    </div>

    <script>
        // Fungsi ganti kategori otomatis terhubung ke Server GamePix milik Rama (sid=1AAA1)
        function switchGameFeed(category, buttonElement) {
            // Ubah tombol aktif
            document.querySelectorAll('.category-tab').forEach(tab => tab.classList.remove('active'));
            buttonElement.classList.add('active');
            
            // Bersihkan kolom pencarian
            document.getElementById('gameSearch').value = '';
            
            const frame = document.getElementById('gamePixFrame');
            
            if (category === 'all') {
                frame.src = "https://www.gamepix.com/showcase?sid=1AAA1";
            } else {
                frame.src = `https://www.gamepix.com/showcase?sid=1AAA1&category=${category}`;
            }
        }

        // Fungsi fitur pencarian langsung kirim ke mesin GamePix
        function handleSearchSubmit(event) {
            if (event.key === 'Enter') {
                const query = document.getElementById('gameSearch').value.trim().toLowerCase();
                if (query !== '') {
                    const frame = document.getElementById('gamePixFrame');
                    frame.src = `https://www.gamepix.com/showcase?sid=1AAA1&q=${encodeURIComponent(query)}`;
                    
                    // Hilangkan efek aktif di semua tombol kategori
                    document.querySelectorAll('.category-tab').forEach(tab => tab.classList.remove('active'));
                }
            }
        }
    </script>

</body>
</html>
