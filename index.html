<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rama Play - Premium Game Station</title>
    <style>
        :root {
            --bg-body: #0b0f19;
            --bg-card: #151f32;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #22314d;
            --primary: #00a3e0;
            --accent: #ff4757;
        }

        [data-theme="light"] {
            --bg-body: #f4f7f6;
            --bg-card: #ffffff;
            --text-main: #1a202c;
            --text-muted: #718096;
            --border-color: #edf2f7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            padding-bottom: 80px;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        .main-header {
            background-color: var(--bg-card);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo {
            font-size: 26px;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0, 163, 224, 0.3);
        }

        .theme-toggle-btn {
            background: linear-gradient(135deg, var(--primary), #0077b6);
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 163, 224, 0.3);
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 25px;
        }

        .search-container {
            margin-bottom: 30px;
        }

        .search-input {
            width: 100%;
            padding: 18px 25px;
            border: 2px solid var(--border-color);
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            outline: none;
            background-color: var(--bg-card);
            color: var(--text-main);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 163, 224, 0.2);
        }

        .search-results-section {
            display: none;
            margin-bottom: 40px;
        }

        .search-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .category-row {
            margin-bottom: 35px;
            position: relative;
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-left: 5px;
        }

        .category-title {
            font-size: 20px;
            font-weight: 800;
            text-transform: capitalize;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .category-title::before {
            content: '';
            display: inline-block;
            width: 5px;
            height: 22px;
            background-color: var(--primary);
            border-radius: 3px;
        }

        .slider-wrapper {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 10px 5px;
            scroll-behavior: smooth;
            scrollbar-width: none;
        }

        .slider-wrapper::-webkit-scrollbar {
            display: none;
        }

        .game-card {
            flex: 0 0 calc(33.333% - 10px);
            max-width: calc(33.333% - 10px);
            background-color: var(--bg-card);
            border-radius: 18px;
            overflow: hidden;
            padding: 10px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            transition: transform 0.2s, border-color 0.2s;
        }

        @media (min-width: 640px) {
            .game-card { flex: 0 0 calc(25% - 12px); max-width: calc(25% - 12px); }
        }
        @media (min-width: 1024px) {
            .game-card { flex: 0 0 calc(16.666% - 13px); max-width: calc(16.666% - 13px); }
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .img-box {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 14px;
            overflow: hidden;
            background: #1e293b;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .game-title {
            font-size: 12px;
            font-weight: 700;
            margin-top: 10px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-main);
        }

        .status-text {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 25px;
            padding-left: 5px;
        }
    </style>
</head>

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const btn = document.getElementById('themeBtn');
            if (currentTheme === 'light') {
                document.documentElement.removeAttribute('data-theme');
                btn.innerHTML = '☀️ Terang';
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                btn.innerHTML = '🌙 Gelap';
                localStorage.setItem('theme', 'light');
            }
        }

        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            document.getElementById('themeBtn').innerHTML = '🌙 Gelap';
        }

        function buildPremiumSliders() {
            const mainSlidersContainer = document.getElementById('mainSlidersContainer');
            mainSlidersContainer.innerHTML = '';

            const categories = [...new Set(globalGamesDatabase.map(game => game.CATEGORY))];

            categories.forEach(catName => {
                const row = document.createElement('div');
                row.className = 'category-row';

                const header = document.createElement('div');
                header.className = 'category-header';
                
                let emoji = "🎮";
                if(catName === "match-3") emoji = "🧩";
                if(catName === "arcade") emoji = "🕹️";
                if(catName === "action") emoji = "⚔️";
                if(catName === "adventure") emoji = "🤠";
                if(catName === "racing") emoji = "🏎️";
                if(catName === "sports") emoji = "⚽";
                if(catName === "strategy") emoji = "🧠";

                header.innerHTML = `<h2 class="category-title">${emoji} ${catName.toUpperCase()}</h2>`;
                row.appendChild(header);

                const sliderWrapper = document.createElement('div');
                sliderWrapper.className = 'slider-wrapper';

                const filteredGames = globalGamesDatabase.filter(game => game.CATEGORY === catName);

                filteredGames.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    
                    card.onclick = () => {
                        window.location.href = game.URL;
                    };

                    card.innerHTML = `
                        <div class="img-box">
                            <img src="${game.Icon}" alt="${game.Title}" loading="lazy" onerror="this.onerror=null; this.src='https://www.gamepix.com/images/game-placeholder.png';">
                        </div>
                        <div class="game-title">${game.Title}</div>
                    `;
                    sliderWrapper.appendChild(card);
                });

                row.appendChild(sliderWrapper);
                mainSlidersContainer.appendChild(row);
            });

            document.getElementById('loadStatus').innerText = `Menampilkan ${globalGamesDatabase.length} Game Premium dalam bentuk Slider Horizontal`;
        }

        function searchGamesEngine() {
            const keyword = document.getElementById('searchBar').value.toLowerCase().trim();
            const searchSection = document.getElementById('searchSection');
            const searchGridContainer = document.getElementById('searchGridContainer');

            if (keyword === "") {
                searchSection.style.display = "none";
                searchGridContainer.innerHTML = "";
                return;
            }

            searchGridContainer.innerHTML = "";
            const matches = globalGamesDatabase.filter(game => game.Title.toLowerCase().includes(keyword));

            if (matches.length > 0) {
                searchSection.style.display = "block";
                matches.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.style.flex = "initial";
                    card.style.maxWidth = "initial";
                    
                    card.onclick = () => {
                        window.location.href = game.URL;
                    };

                    card.innerHTML = `
                        <div class="img-box">
                            <img src="${game.Icon}" alt="${game.Title}" loading="lazy">
                        </div>
                        <div class="game-title">${game.Title}</div>
                    `;
                    searchGridContainer.appendChild(card);
                });
            } else {
                searchSection.style.display = "block";
                searchGridContainer.innerHTML = `<div style="grid-column: span 3; text-align: center; color: var(--text-muted); padding: 20px; font-weight: bold;">Game "${keyword}" tidak ditemukan...</div>`;
            }
        }

        buildPremiumSliders();
