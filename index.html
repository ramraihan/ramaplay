<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rama Play</title>
    <style>
        :root {
            --bg-body: #f4f7f6;
            --bg-card: #ffffff;
            --text-main: #1a202c;
            --text-muted: #718096;
            --border-color: #edf2f7;
            --header-shadow: rgba(0,0,0,0.04);
        }

        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --header-shadow: rgba(0,0,0,0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            padding-bottom: 60px;
            min-height: 100vh;
        }

        .main-header {
            background-color: var(--bg-card);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 10px var(--header-shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo {
            font-size: 22px;
            font-weight: 800;
            color: #00a3e0;
        }

        .theme-toggle-btn {
            background: #00a3e0;
            color: #ffffff;
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 10px rgba(0, 163, 224, 0.2);
        }

        .theme-toggle-btn:hover {
            background: #008cc2;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px;
        }

        .search-container {
            margin: 15px 0;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            outline: none;
            background-color: var(--bg-card);
            color: var(--text-main);
        }

        .search-input:focus {
            border-color: #00a3e0;
            box-shadow: 0 0 0 3px rgba(0, 163, 224, 0.15);
        }

        .category-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 5px 0 15px 0;
            scrollbar-width: none;
        }

        .category-scroll::-webkit-scrollbar {
            display: none;
        }

        .category-item {
            background-color: var(--bg-card);
            color: var(--text-muted);
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 13.5px;
            font-weight: 700;
            border: 1px solid var(--border-color);
            cursor: pointer;
            white-space: nowrap;
        }

        .category-item:hover {
            border-color: #00a3e0;
            color: #00a3e0;
        }

        .category-item.active {
            background: #00a3e0;
            color: #ffffff;
            border-color: #00a3e0;
            box-shadow: 0 4px 12px rgba(0, 163, 224, 0.2);
        }

        .status-text {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-muted);
            margin: 10px 0 20px 5px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        @media (min-width: 600px) {
            .games-grid { grid-template-columns: repeat(4, 1fr); }
        }
        @media (min-width: 900px) {
            .games-grid { grid-template-columns: repeat(6, 1fr); }
        }

        .game-card {
            background-color: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            padding: 8px;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            cursor: pointer;
        }

        .game-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            border-color: #00a3e0;
        }

        .img-box {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 12px;
            overflow: hidden;
            background: #e2e8f0;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .game-title {
            font-size: 12px;
            font-weight: 700;
            margin-top: 8px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .loader {
            text-align: center;
            font-size: 16px;
            color: #00a3e0;
            padding: 40px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="main-header">
        <div class="header-logo">🎮 Rama Play</div>
        <button class="theme-toggle-btn" onclick="toggleTheme()" id="themeBtn">🌙 Gelap</button>
    </div>

    <div class="container">
        
        <div class="search-container">
            <input type="text" id="searchBar" class="search-input" placeholder="Cari game kesukaanmu di sini..." oninput="searchGames()">
        </div>

        <div class="category-scroll">
            <button class="category-item active" onclick="changeCategory('all', this)">Semua Game</button>
            <button class="category-item" onclick="changeCategory('arcade', this)">🕹️ Arkade</button>
            <button class="category-item" onclick="changeCategory('action', this)">⚔️ Aksi</button>
            <button class="category-item" onclick="changeCategory('adventure', this)">🤠 Petualangan</button>
            <button class="category-item" onclick="changeCategory('puzzle', this)">🧩 Puzzle</button>
            <button class="category-item" onclick="changeCategory('racing', this)">🏎️ Balapan</button>
            <button class="category-item" onclick="changeCategory('sports', this)">⚽ Olahraga</button>
            <button class="category-item" onclick="changeCategory('strategy', this)">🧠 Strategi</button>
        </div>

        <div class="status-text" id="loadStatus">Memproses database Rama Play...</div>
        
        <div class="games-grid" id="gamesContainer"></div>
        <div id="loadingIndicator" class="loader">Memuat katalog game...</div>

    </div>

    <script>
        let currentActiveCategory = 'all';
        let databaseGames = [];

        // KATALOG GAME DI-UPGRADE JADI BANYAK DENGAN GAMBAR 100% MUNCUL & LINK SID RAMA (1AAA1)
        const backupGamesList = [
            // KATEGORI: AKSI
            { title: "Defend The Tank", category: "action", banner_image: "https://images.gamepix.com/defend-the-tank/thumbnail/small.png", id: "defend-the-tank" },
            { title: "Knight 360", category: "action", banner_image: "https://images.gamepix.com/knight-360/thumbnail/small.png", id: "knight-360" },
            { title: "Sierras Flight", category: "action", banner_image: "https://images.gamepix.com/sierras-flight/thumbnail/small.png", id: "sierras-flight" },
            { title: "Stickman War", category: "action", banner_image: "https://images.gamepix.com/stickman-war/thumbnail/small.png", id: "stickman-war" },
            
            // KATEGORI: BALAPAN
            { title: "Drift Cup Racing", category: "racing", banner_image: "https://images.gamepix.com/drift-cup-racing/thumbnail/small.png", id: "drift-cup-racing" },
            { title: "Desert Road", category: "racing", banner_image: "https://images.gamepix.com/desert-road/thumbnail/small.png", id: "desert-road" },
            { title: "Super Racing", category: "racing", banner_image: "https://images.gamepix.com/mini-race-rush/thumbnail/small.png", id: "mini-race-rush" },
            { title: "Moto X3M Pool Party", category: "racing", banner_image: "https://images.gamepix.com/moto-x3m-4-pool-party/thumbnail/small.png", id: "moto-x3m-4-pool-party" },

            // KATEGORI: PUZZLE
            { title: "Unblock That", category: "puzzle", banner_image: "https://images.gamepix.com/unblock-that/thumbnail/small.png", id: "unblock-that" },
            { title: "Merge Cakes", category: "puzzle", banner_image: "https://images.gamepix.com/merge-cakes/thumbnail/small.png", id: "merge-cakes" },
            { title: "TenTrix", category: "puzzle", banner_image: "https://images.gamepix.com/tentrix/thumbnail/small.png", id: "tentrix" },
            { title: "2048 Dragon", category: "puzzle", banner_image: "https://images.gamepix.com/2048-dragon/thumbnail/small.png", id: "2048-dragon" },

            // KATEGORI: OLAHRAGA
            { title: "Foot Chinko", category: "sports", banner_image: "https://images.gamepix.com/foot-chinko/thumbnail/small.png", id: "foot-chinko" },
            { title: "Classic Bowling", category: "sports", banner_image: "https://images.gamepix.com/classic-bowling/thumbnail/small.png", id: "classic-bowling" },
            { title: "Basketball Stars", category: "sports", banner_image: "https://images.gamepix.com/basketball-stars/thumbnail/small.png", id: "basketball-stars" },
            { title: "Penalty Kick Wiz", category: "sports", banner_image: "https://images.gamepix.com/penalty-kick-wiz/thumbnail/small.png", id: "penalty-kick-wiz" },

            // KATEGORI: ARKADE
            { title: "Swoop", category: "arcade", banner_image: "https://images.gamepix.com/swoop/thumbnail/small.png", id: "swoop" },
            { title: "Neon Tower", category: "arcade", banner_image: "https://images.gamepix.com/neon-tower/thumbnail/small.png", id: "neon-tower" },
            { title: "Pac-Xon", category: "arcade", banner_image: "https://images.gamepix.com/pac-xon/thumbnail/small.png", id: "pac-xon" },
            { title: "Tap Tap Dash", category: "arcade", banner_image: "https://images.gamepix.com/tap-tap-dash/thumbnail/small.png", id: "tap-tap-dash" },

            // KATEGORI: STRATEGI & PETUALANGAN
            { title: "Slime Rush TD", category: "strategy", banner_image: "https://images.gamepix.com/slime-rush-td/thumbnail/small.png", id: "slime-rush-td" },
            { title: "Ludo Legend", category: "strategy", banner_image: "https://images.gamepix.com/ludo-legend/thumbnail/small.png", id: "ludo-legend" },
            { title: "Gladiators", category: "strategy", banner_image: "https://images.gamepix.com/gladiators/thumbnail/small.png", id: "gladiators" },
            { title: "Subway Stone", category: "adventure", banner_image: "https://images.gamepix.com/subway-stone/thumbnail/small.png", id: "subway-stone" }
        ];

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const btn = document.getElementById('themeBtn');
            
            if (currentTheme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                btn.innerHTML = '🌙 Gelap';
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                btn.innerHTML = '☀️ Terang';
                localStorage.setItem('theme', 'dark');
            }
        }

        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.getElementById('themeBtn').innerHTML = '☀️ Terang';
        }

        async function loadGamePixFeed() {
            document.getElementById('loadingIndicator').style.display = 'block';
            
            const targetUrl = "https://feeds.gamepix.com/v2/json?sid=1AAA1&pagination=50&page=1";
            
            try {
                const response = await fetch(targetUrl, { method: "GET", credentials: "omit" });
                if (!response.ok) throw new Error("CORS Blocked");
                
                const jsonResult = await response.json();
                let liveItems = jsonResult.items || [];
                
                if(liveItems.length > 0) {
                    databaseGames = liveItems;
                } else {
                    databaseGames = backupGamesList;
                }
            } catch (err) {
                // Gunakan backup array dengan data lengkap bawaan CDN
                databaseGames = backupGamesList;
            }

            displayFilteredGames();
        }

        function displayFilteredGames() {
            const container = document.getElementById('gamesContainer');
            container.innerHTML = '';

            let filteredList = databaseGames;
            if (currentActiveCategory !== 'all') {
                filteredList = databaseGames.filter(game => {
                    const gameCat = game.category ? game.category.toLowerCase() : '';
                    return gameCat === currentActiveCategory;
                });
            }

            document.getElementById('loadingIndicator').style.display = 'none';

            if (filteredList.length === 0) {
                document.getElementById('loadStatus').innerText = "Tidak ada game di kategori ini.";
                return;
            }

            filteredList.forEach(game => {
                const card = document.createElement('div');
                card.className = "game-card";
                card.style.display = 'flex';
                
                const gameTitleText = game.title || 'Permainan';
                card.setAttribute('data-name', gameTitleText.toLowerCase());
                
                // LINK MONETISASI: Menghubungkan otomatis dengan SID 1AAA1 milik Rama agar dapet uang iklan
                const gameSlug = game.id || game.title.toLowerCase().replace(/ /g, "-");
                const monetizationUrl = `https://play.gamepix.com/${gameSlug}?sid=1AAA1`;
                
                card.onclick = () => { 
                    window.location.href = monetizationUrl;
                };

                const imageSource = game.banner_image || game.image || `https://images.gamepix.com/${gameSlug}/thumbnail/small.png`;

                card.innerHTML = `
                    <div class="img-box">
                        <img src="${imageSource}" alt="${gameTitleText}" loading="lazy" onerror="this.src='https://via.placeholder.com/150?text=Game'">
                    </div>
                    <div class="game-title">${gameTitleText}</div>
                `;
                container.appendChild(card);
            });

            const totalVisible = document.querySelectorAll('.game-card[style*="display: flex"]').length;
            document.getElementById('loadStatus').innerText = `Menampilkan ${totalVisible} game seru, siap dimainkan!`;
        }

        function searchGames() {
            const searchKeyword = document.getElementById('searchBar').value.toLowerCase().trim();
            const allCards = document.querySelectorAll('.game-card');
            
            allCards.forEach(card => {
                const name = card.getAttribute('data-name');
                card.style.display = name.includes(searchKeyword) ? 'flex' : 'none';
            });
            
            const totalVisible = document.querySelectorAll('.game-card[style*="display: flex"]').length;
            document.getElementById('loadStatus').innerText = `Ditemukan ${totalVisible} game cocok`;
        }

        function changeCategory(categoryName, element) {
            document.querySelectorAll('.category-item').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');

            currentActiveCategory = categoryName;
            document.getElementById('searchBar').value = '';
            displayFilteredGames();
        }

        loadGamePixFeed();
    </script>

</body>
</html>
