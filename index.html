<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rama Play</title>
    <style>
        :root {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --primary: #00a3e0;
        }

        [data-theme="light"] {
            --bg-body: #f4f7f6;
            --bg-card: #ffffff;
            --text-main: #1a202c;
            --text-muted: #718096;
            --border-color: #edf2f7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            padding-bottom: 60px;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        .main-header {
            background-color: var(--bg-card);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo {
            font-size: 24px;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: 0.5px;
        }

        .theme-toggle-btn {
            background: var(--primary);
            color: #ffffff;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .search-container {
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid var(--border-color);
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            outline: none;
            background-color: var(--bg-card);
            color: var(--text-main);
        }

        .search-input:focus {
            border-color: var(--primary);
        }

        .category-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 15px;
            margin-bottom: 15px;
            scrollbar-width: none;
        }

        .category-scroll::-webkit-scrollbar {
            display: none;
        }

        .category-item {
            background-color: var(--bg-card);
            color: var(--text-muted);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 700;
            border: 1px solid var(--border-color);
            cursor: pointer;
            white-space: nowrap;
            text-transform: capitalize;
            transition: all 0.2s;
        }

        .category-item.active, .category-item:hover {
            background-color: var(--primary);
            color: #ffffff;
            border-color: var(--primary);
        }

        .status-text {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        /* TAMPILAN 3 KOTAK PRESISI UNTUK LAYAR HP */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        @media (min-width: 768px) {
            .games-grid { grid-template-columns: repeat(5, 1fr); }
        }
        @media (min-width: 1200px) {
            .games-grid { grid-template-columns: repeat(8, 1fr); }
        }

        .game-card {
            background-color: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            padding: 8px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .game-card:hover {
            transform: scale(1.05);
            border-color: var(--primary);
        }

        .img-box {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 12px;
            overflow: hidden;
            background: #334155;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .game-title {
            font-size: 11px;
            font-weight: 700;
            margin-top: 8px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    </div>

            <button class="category-item active" onclick="changeCategory('all', this)">Semua Game</button>

        <div class="games-grid" id="gamesContainer"></div>

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const btn = document.getElementById('themeBtn');
            if (currentTheme === 'light') {
                document.documentElement.removeAttribute('data-theme');
                btn.innerHTML = '☀️ Terang';
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                btn.innerHTML = '🌙 Gelap';
                localStorage.setItem('theme', 'light');
            }
        }

        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            document.getElementById('themeBtn').innerHTML = '🌙 Gelap';
        }

        function buildCategories() {
            const catContainer = document.getElementById('categoryContainer');
            const uniqueCategories = new Set();

            globalGamesList.forEach(game => {
                if (game.category) uniqueCategories.add(game.category.toLowerCase().trim());
            });

            uniqueCategories.forEach(catName => {
                const btn = document.createElement('button');
                btn.className = "category-item";
                btn.innerText = catName;
                btn.onclick = function() { changeCategory(catName, btn); };
                catContainer.appendChild(btn);
            });
        }

        function displayGamesEngine() {
            const container = document.getElementById('gamesContainer');
            container.innerHTML = '';

            let filteredList = globalGamesList;
            if (currentActiveCategory !== 'all') {
                filteredList = globalGamesList.filter(game => game.category === currentActiveCategory);
            }

            filteredList.forEach(game => {
                const card = document.createElement('div');
                card.className = "game-card";
                
                const titleText = game.title;
                card.setAttribute('data-name', titleText.toLowerCase());

                // LINK ASLI PENYALUR KEUNTUNGAN RAMA - REVENUE AKTIF DENGAN SID
                card.onclick = () => {
                    window.location.href = `https://www.gamepix.com/live/${game.id}?sid=1AAA1`;
                };

                // IMAGE LOADING ENGINE DENGAN FALLBACK AMAN JIKA SERVER SIBUK
                const imgUrl = `https://images.gamepix.com/${game.id}/thumbnail/small.png`;

                card.innerHTML = `
                    <div class="img-box">
                        <img src="${imgUrl}" alt="${titleText}" loading="lazy" onerror="this.onerror=null; this.src='https://www.gamepix.com/images/game-placeholder.png';">
                    </div>
                    <div class="game-title">${titleText}</div>
                `;
                container.appendChild(card);
            });

            document.getElementById('loadStatus').innerText = `Menampilkan ${filteredList.length} game pilihan di kategori ini`;
        }

        function searchGames() {
            const keyword = document.getElementById('searchBar').value.toLowerCase().trim();
            const allCards = document.querySelectorAll('.game-card');
            let foundCount = 0;

            allCards.forEach(card => {
                const name = card.getAttribute('data-name');
                if (name.includes(keyword)) {
                    card.style.display = 'flex';
                    foundCount++;
                } else {
                    card.style.display = 'none';
                }
            });

            document.getElementById('loadStatus').innerText = `Ditemukan ${foundCount} game cocok`;
        }

        function changeCategory(categoryName, element) {
            document.querySelectorAll('.category-item').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            currentActiveCategory = categoryName;
            document.getElementById('searchBar').value = '';
            displayGamesEngine();
        }

        // MENJALANKAN ENGINE UTAMA SECARA INSTAN
        buildCategories();
        displayGamesEngine();
    </script>

</html>
