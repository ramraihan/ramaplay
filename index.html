<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rama Play</title>
    <style>
        :root {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --primary: #00a3e0;
        }

        [data-theme="light"] {
            --bg-body: #f4f7f6;
            --bg-card: #ffffff;
            --text-main: #1a202c;
            --text-muted: #718096;
            --border-color: #edf2f7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            padding-bottom: 60px;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Header Bergaya GamePix Premium */
        .main-header {
            background-color: var(--bg-card);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo {
            font-size: 24px;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: 0.5px;
        }

        .theme-toggle-btn {
            background: var(--primary);
            color: #ffffff;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Kolom Pencarian Modern */
        .search-container {
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid var(--border-color);
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            outline: none;
            background-color: var(--bg-card);
            color: var(--text-main);
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--primary);
        }

        /* Slider Kategori Otomatis - Banyak Menu Kategori */
        .category-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 15px;
            margin-bottom: 15px;
            scrollbar-width: none;
        }

        .category-scroll::-webkit-scrollbar {
            display: none;
        }

        .category-item {
            background-color: var(--bg-card);
            color: var(--text-muted);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 700;
            border: 1px solid var(--border-color);
            cursor: pointer;
            white-space: nowrap;
            text-transform: capitalize;
            transition: all 0.2s;
        }

        .category-item.active, .category-item:hover {
            background-color: var(--primary);
            color: #ffffff;
            border-color: var(--primary);
        }

        .status-text {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        /* Grid Tampilan Tepat 3 Kotak Bersih di HP, Luas di Desktop */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        @media (min-width: 640px) {
            .games-grid { grid-template-columns: repeat(4, 1fr); }
        }
        @media (min-width: 1024px) {
            .games-grid { grid-template-columns: repeat(6, 1fr); }
        }
        @media (min-width: 1400px) {
            .games-grid { grid-template-columns: repeat(8, 1fr); }
        }

        /* Desain Card Kotak Mulus */
        .game-card {
            background-color: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            padding: 8px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .game-card:hover {
            transform: scale(1.04);
            border-color: var(--primary);
        }

        .img-box {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 12px;
            overflow: hidden;
            background: #334155;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .game-title {
            font-size: 12px;
            font-weight: 700;
            margin-top: 8px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .loader {
            text-align: center;
            font-size: 18px;
            color: var(--primary);
            padding: 50px 0;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="main-header">
        <div class="header-logo">🎮 RAMA PLAY</div>
        <button class="theme-toggle-btn" onclick="toggleTheme()" id="themeBtn">☀️ Terang</button>
    </div>

    <div class="container">
        
        <div class="search-container">
            <input type="text" id="searchBar" class="search-input" placeholder="Cari game seru dari GamePix..." oninput="searchGames()">
        </div>

        <div class="category-scroll" id="categoryContainer">
            <button class="category-item active" onclick="changeCategory('all', this)">Semua Game</button>
        </div>

        <div class="status-text" id="loadStatus">Menghubungkan ke Feed Resmi GamePix...</div>
        <div id="loadingIndicator" class="loader">Sedang mengambil ratusan katalog game...</div>
        
        <div class="games-grid" id="gamesContainer"></div>

    </div>

    <script>
        let currentActiveCategory = 'all';
        let globalGamesList = [];

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const btn = document.getElementById('themeBtn');
            if (currentTheme === 'light') {
                document.documentElement.removeAttribute('data-theme');
                btn.innerHTML = '☀️ Terang';
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                btn.innerHTML = '🌙 Gelap';
                localStorage.setItem('theme', 'light');
            }
        }

        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            document.getElementById('themeBtn').innerHTML = '🌙 Gelap';
        }

        // SISTEM AMBIL DATA OTOMATIS DAN SEKALIGUS BANYAK (ANTI BATASAN)
        async function fetchGamePixData() {
            const loadIndicator = document.getElementById('loadingIndicator');
            loadIndicator.style.display = 'block';

            // Menarik 100 game sekaligus dari Feed v2 resmi milik Rama Play
            const feedApiUrl = "https://feeds.gamepix.com/v2/json?sid=1AAA1&pagination=100&page=1";
            const secureProxy = "https://api.allorigins.win/get?url=" + encodeURIComponent(feedApiUrl);

            try {
                const res = await fetch(secureProxy);
                const proxyData = await res.json();
                const cleanJson = JSON.parse(proxyData.contents);

                // MEMBACA OBJEK VARIABEL UTAMA 'items' SESUAI SCREENSHOT FEED V2
                globalGamesList = cleanJson.items || [];

                if (globalGamesList.length === 0) {
                    throw new Error("Data Kosong");
                }

                // Bangun Kategori Secara Otomatis Berdasarkan Data Asli GamePix
                buildCategoriesDynamically();
                displayGamesEngine();

            } catch (err) {
                console.error(err);
                document.getElementById('loadStatus').innerText = "Gagal memuat feed live. Mencoba jalur alternatif aman...";
                
                // Jalur Bypass Cadangan Langsung Tanpa Proxy jika AllOrigins Sibuk
                try {
                    const fallbackRes = await fetch("https://api.codetabs.com/v1/proxy?url=" + encodeURIComponent(feedApiUrl));
                    const fallbackData = await fallbackRes.json();
                    globalGamesList = fallbackData.items || [];
                    buildCategoriesDynamically();
                    displayGamesEngine();
                } catch(e) {
                    document.getElementById('loadStatus').innerText = "Koneksi API dibatasi oleh browser. Silakan muat ulang halaman.";
                    loadIndicator.style.display = 'none';
                }
            }
        }

        // SISTEM MEMBUAT KATEGORI BANYAK SECARA OTOMATIS
        function buildCategoriesDynamically() {
            const catContainer = document.getElementById('categoryContainer');
            const uniqueCategories = new Set();

            globalGamesList.forEach(game => {
                if (game.category) {
                    uniqueCategories.add(game.category.toLowerCase().trim());
                }
            });

            // Tambahkan semua kategori unik yang ditemukan di server GamePix ke menu geser
            uniqueCategories.forEach(catName => {
                const btn = document.createElement('button');
                btn.className = "category-item";
                btn.innerText = catName;
                btn.onclick = function() { changeCategory(catName, btn); };
                catContainer.appendChild(btn);
            });
        }

        // ENGINE UTAMA UNTUK MENAMPILKAN SEMUA GAME DAN GAMBAR TANPA BLOKIR
        function displayGamesEngine() {
            document.getElementById('loadingIndicator').style.display = 'none';
            const container = document.getElementById('gamesContainer');
            container.innerHTML = '';

            let filteredList = globalGamesList;
            if (currentActiveCategory !== 'all') {
                filteredList = globalGamesList.filter(game => {
                    return game.category && game.category.toLowerCase().trim() === currentActiveCategory;
                });
            }

            filteredList.forEach(game => {
                const card = document.createElement('div');
                card.className = "game-card";
                
                // Membaca variabel 'title' asli dari feed v2
                const titleText = game.title || "Game Seru";
                card.setAttribute('data-name', titleText.toLowerCase());

                // MENGARAHKAN LANGSUNG KE URL GAME RESMI LENGKAP DENGAN SID PENGECEK KEUNTUNGAN RAMA
                card.onclick = () => {
                    if (game.url) {
                        // Menambahkan / Memastikan Parameter SID 1AAA1 Aktif Agar Rama Dapat Pendapatan Iklan
                        const finalLink = game.url.includes('sid=') ? game.url : `${game.url}&sid=1AAA1`;
                        window.location.href = finalLink;
                    }
                };

                // MEMBACA GAMBAR ASLI DARI VARIABEL 'banner_image' ATAU 'image'
                const imgUrl = game.banner_image || game.image || "https://www.gamepix.com/images/game-placeholder.png";

                card.innerHTML = `
                    <div class="img-box">
                        <img src="${imgUrl}" alt="${titleText}" loading="lazy" referrerpolicy="no-referrer">
                    </div>
                    <div class="game-title">${titleText}</div>
                `;
                container.appendChild(card);
            });

            document.getElementById('loadStatus').innerText = `Semua Game Siap! Menampilkan ${filteredList.length} Game Terbaik`;
        }

        function searchGames() {
            const keyword = document.getElementById('searchBar').value.toLowerCase().trim();
            const allCards = document.querySelectorAll('.game-card');
            let foundCount = 0;

            allCards.forEach(card => {
                const name = card.getAttribute('data-name');
                if (name.includes(keyword)) {
                    card.style.display = 'flex';
                    foundCount++;
                } else {
                    card.style.display = 'none';
                }
            });

            document.getElementById('loadStatus').innerText = `Ditemukan ${foundCount} game yang cocok dengan pencarianmu`;
        }

        function changeCategory(categoryName, element) {
            document.querySelectorAll('.category-item').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            currentActiveCategory = categoryName;
            document.getElementById('searchBar').value = '';
            displayGamesEngine();
        }

        // Eksekusi otomatis mengambil data live GamePix saat halaman dimuat
        fetchGamePixData();
    </script>

</body>
</html>
