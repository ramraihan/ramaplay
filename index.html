<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rama Play - Premium Game Portal</title>
    
    <!-- Meta SEO -->
    <meta name="description" content="Rama Play - Portal game online premium terlengkap dan gratis. Mainkan ratusan game seru langsung dari browser Anda tanpa download!">
    <meta name="keywords" content="Rama Play, game online gratis, main game tanpa download, game premium gratis">
    <meta name="author" content="Rama">

    <!-- Kode Verifikasi Google Search Console -->
    <meta name="google-site-verification" content="LaFbPV8hMYM2aHhs4tWhLmxLdHLO7KtbytX3wyTd21c" />

    <style>
        :root {
            --bg-body: #e0f2fe; 
            --bg-gradient: linear-gradient(145deg, #bae6fd 0%, #e0f2fe 100%);
            --bg-card: rgba(255, 255, 255, 0.75);
            --bg-card-hover: rgba(255, 255, 255, 0.95);
            --text-main: #0369a1; 
            --text-muted: #0284c7;
            --border-color: rgba(56, 189, 248, 0.2);
            --primary: #0284c7; 
            --primary-glow: rgba(56, 189, 248, 0.4);
            --glass-blur: blur(12px);
        }

        [data-theme="dark"] {
            /* Mode Gelap (Ketika tombol diklik untuk beralih ke gelap) */
            --bg-body: #0f172a;
            --bg-gradient: linear-gradient(145deg, #020617 0%, #0f172a 100%);
            --bg-card: rgba(30, 41, 59, 0.7);
            --bg-card-hover: rgba(51, 65, 85, 0.9);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.06);
            --primary: #38bdf8;
            --primary-glow: rgba(56, 189, 248, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            padding-bottom: 60px;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        .main-header {
            background: var(--bg-card);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            padding: 20px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: relative;
            z-index: 100;
        }

        .header-logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .header-logo span {
            color: var(--primary);
            text-shadow: 0 0 15px var(--primary-glow);
        }

        .theme-toggle-btn {
            background: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 10px 22px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .theme-toggle-btn:hover {
            border-color: var(--primary);
            box-shadow: 0 0 12px var(--primary-glow);
        }

        .container {
            width: 100%;
            max-width: 100%; 
            padding: 20px;
        }

        .search-container {
            margin-bottom: 35px;
        }

        .search-input {
            width: 100%;
            padding: 18px 25px;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            font-size: 15px;
            font-weight: 500;
            outline: none;
            background: var(--bg-card);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .categories-nav-container {
            margin-bottom: 35px;
        }

        .nav-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .categories-tabs {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 12px;
            scrollbar-width: none;
        }

        .categories-tabs::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            background: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 12px 24px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tab-btn.active, .tab-btn:hover {
            background: var(--primary);
            color: #ffffff;
            border-color: var(--primary);
            box-shadow: 0 8px 20px var(--primary-glow);
            transform: translateY(-2px);
        }

        .section-header-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 25px;
            letter-spacing: -0.5px;
        }

        .games-grid-main {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        @media (min-width: 640px) { .games-grid-main { grid-template-columns: repeat(4, 1fr); gap: 14px; } }
        @media (min-width: 1024px) { .games-grid-main { grid-template-columns: repeat(6, 1fr); gap: 16px; } }
        @media (min-width: 1400px) { .games-grid-main { grid-template-columns: repeat(8, 1fr); gap: 18px; } }
        @media (min-width: 1800px) { .games-grid-main { grid-template-columns: repeat(10, 1fr); gap: 20px; } }

        .game-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            overflow: hidden;
            padding: 10px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 12px rgba(3, 105, 161, 0.05);
        }

        .game-card:hover {
            background: var(--bg-card-hover);
            transform: translateY(-6px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 12px 30px rgba(3, 105, 161, 0.15), 0 0 15px var(--primary-glow);
        }

        .img-box {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 12px;
            overflow: hidden;
            background: #e2e8f0;
            position: relative;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .game-card:hover .img-box img {
            transform: scale(1.08);
        }

        .game-title {
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-main);
            padding: 0 4px;
        }

        .status-text {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 25px;
        }

        .load-more-container {
            display: flex;
            justify-content: center;
            margin-top: 40px;
        }

        .load-more-btn {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 14px 40px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .load-more-btn:hover {
            background: var(--primary);
            color: #ffffff;
            box-shadow: 0 8px 25px var(--primary-glow);
            transform: scale(1.02);
        }

        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--bg-card);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            width: 48px;
            height: 48px;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.25s ease;
        }

        .back-to-top.show {
            opacity: 1;
            visibility: visible;
        }

        .back-to-top:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <div class="main-header">
        <div class="header-logo">RAMA<span>PLAY</span></div>
        <!-- PERBAIKAN: Mengganti teks awal tombol agar pas dengan nuansa biru muda cerah bawaan -->
        <button class="theme-toggle-btn" onclick="toggleTheme()" id="themeBtn">🌙 Dark Mode</button>
    </div>

    <div class="container">
        
        <div class="search-container">
            <input type="text" id="searchBar" class="search-input" placeholder="Cari game favoritmu di sini..." oninput="searchGamesEngine()">
        </div>

        <div class="categories-nav-container">
            <div class="nav-title">Kategori Unggulan</div>
            <div class="categories-tabs" id="categoriesTabsContainer"></div>
        </div>

        <div class="status-text" id="loadStatus">Sinkronisasi feed server GamePix...</div>

        <div class="section-header-title" id="currentSectionTitle">Semua Game</div>
        
        <div class="games-grid-main" id="gamesGridContainer"></div>

        <div class="load-more-container">
            <button class="load-more-btn" onclick="loadNextPageOfGames()" id="loadMoreBtn">Muat Game Lainnya</button>
        </div>

    </div>

    <button class="back-to-top" id="btnBackToTop" onclick="scrollToTop()">↑</button>

    <script>
        let globalGamesDatabase = [];
        let currentPage = 1;
        let selectedCategory = "semua";
        const partnerSid = "1";

        const staticCategoriesList = [
            "semua", "roblox", "arcade", "puzzle", "action", "adventure", "racing", "sports", "strategy", "kids"
        ];

        window.onscroll = function() {
            const btn = document.getElementById("btnBackToTop");
            if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
                btn.classList.add("show");
            } else {
                btn.classList.remove("show");
            }
        };

        function scrollToTop() {
            window.scrollTo({
                top: 0,
                behavior: "smooth"
            });
        }

        /* PERBAIKAN LOGIKA: Memastikan perpindahan teks tombol dan tema warna berjalan sinkron sempurna */
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const btn = document.getElementById('themeBtn');
            if (currentTheme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                btn.innerHTML = '🌙 Dark Mode';
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                btn.innerHTML = '☀️ Light Mode';
                localStorage.setItem('theme', 'dark');
            }
        }

        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.getElementById('themeBtn').innerHTML = '☀️ Light Mode';
        } else {
            document.getElementById('themeBtn').innerHTML = '🌙 Dark Mode';
        }

        function shuffleArray(array) {
            let cloned = [...array];
            for (let i = cloned.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cloned[i], cloned[j]] = [cloned[j], cloned[i]];
            }
            return cloned;
        }

        async function fetchGamesFromOfficialFeed(pageNumber = 1, appendData = false) {
            try {
                document.getElementById('loadStatus').innerText = `⏳ Memuat halaman data ${pageNumber}...`;
                
                const apiUrl = `https://feeds.gamepix.com/v2/json?order=quality&page=${pageNumber}&pagination=96&sid=${partnerSid}`;
                
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('Respon server GamePix bermasalah');
                
                const resData = await response.json();
                
                if (resData && resData.items) {
                    if (appendData) {
                        let combined = [...globalGamesDatabase, ...resData.items];
                        globalGamesDatabase = Array.from(new Map(combined.map(item => [item.id, item])).values());
                    } else {
                        globalGamesDatabase = resData.items;
                    }
                    
                    document.getElementById('loadStatus').innerText = `✨ Sinkronisasi berhasil. Terhubung dengan ${globalGamesDatabase.length} data game premium.`;
                    buildCategoriesMenu();
                    renderGamesGrid();
                }
            } catch (error) {
                console.error(error);
                document.getElementById('loadStatus').innerText = "Gagal memuat feed real-time. Beralih ke sistem penyimpanan lokal...";
                if(!appendData) loadFallbackDatabase();
            }
        }

        function loadNextPageOfGames() {
            currentPage++;
            fetchGamesFromOfficialFeed(currentPage, true);
        }

        function buildCategoriesMenu() {
            const tabsContainer = document.getElementById('categoriesTabsContainer');
            tabsContainer.innerHTML = '';

            staticCategoriesList.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${selectedCategory === cat ? 'active' : ''}`;
                
                let label = cat.toUpperCase();
                if(cat === "semua") label = "📱 Semua Game";
                if(cat === "roblox") label = "🧱 Roblox Styles";
                if(cat === "puzzle") label = "🧩 Puzzle";
                if(cat === "arcade") label = "🕹️ Arcade";
                if(cat === "action") label = "⚔️ Action";
                if(cat === "adventure") label = "🤠 Adventure";
                if(cat === "racing") label = "🏎️ Racing";
                if(cat === "sports") label = "⚽ Sports";
                if(cat === "strategy") label = "🧠 Strategy";
                if(cat === "kids") label = "👶 Kids & Memasak";

                btn.innerText = label;
                btn.onclick = () => {
                    selectedCategory = cat;
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById('searchBar').value = "";
                    renderGamesGrid();
                };
                tabsContainer.appendChild(btn);
            });
        }

        function renderGamesGrid(gamesToDisplay = null) {
            const gridContainer = document.getElementById('gamesGridContainer');
            const sectionTitle = document.getElementById('currentSectionTitle');
            gridContainer.innerHTML = '';

            let targetGames = gamesToDisplay;
            
            if (!targetGames) {
                if (selectedCategory === "semua") {
                    targetGames = shuffleArray(globalGamesDatabase);
                    sectionTitle.innerText = `Menampilkan Semua Game Premium (${targetGames.length})`;
                } else {
                    let strictlyMatched = globalGamesDatabase.filter(game => {
                        const gameCat = (game.category || "").toLowerCase();
                        const gameTitle = (game.title || "").toLowerCase();
                        const gameDesc = (game.description || "").toLowerCase();
                        
                        if (selectedCategory === "roblox") {
                            return gameTitle.includes("roblox") || gameTitle.includes("craft") || 
                                   gameTitle.includes("block") || gameTitle.includes("mine") || 
                                   gameDesc.includes("roblox") || gameDesc.includes("pixel");
                        }
                        
                        if (selectedCategory === "kids") {
                            return gameCat.includes("kids") || gameCat.includes("girl") || 
                                   gameTitle.includes("cook") || gameTitle.includes("cake") || 
                                   gameTitle.includes("burger") || gameTitle.includes("kitchen");
                        }
                        return gameCat.includes(selectedCategory);
                    });

                    strictlyMatched = shuffleArray(strictlyMatched);

                    let finalArr = [...strictlyMatched];
                    if (finalArr.length < 32 && globalGamesDatabase.length > 32) {
                        let backgroundPool = shuffleArray(globalGamesDatabase);
                        for (let i = 0; i < backgroundPool.length; i++) {
                            if (finalArr.length >= 32) break;
                            if (!finalArr.some(g => g.id === backgroundPool[i].id)) {
                                finalArr.push(backgroundPool[i]);
                            }
                        }
                    }

                    targetGames = finalArr;
                    sectionTitle.innerText = `${selectedCategory.charAt(0).toUpperCase() + selectedCategory.slice(1)} (${strictlyMatched.length} Game Relevan)`;
                }
            }

            if (targetGames.length === 0) {
                gridContainer.innerHTML = `<div style="grid-column: span 3; text-align: center; color: var(--text-muted); padding: 40px; font-weight: 500;">Game tidak ditemukan. Silakan muat ulang data atau periksa pencarian Anda.</div>`;
                return;
            }

            const uniqueMap = new Map();
            targetGames.forEach(game => {
                if (!uniqueMap.has(game.id)) uniqueMap.set(game.id, game);
            });

            uniqueMap.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                
                const finalPlayUrl = game.url;
                const finalIconUrl = game.image;

                card.onclick = () => {
                    window.location.href = finalPlayUrl;
                };

                card.innerHTML = `
                    <div class="img-box">
                        <img src="${finalIconUrl}" alt="${game.title}" loading="lazy" onerror="this.onerror=null; this.src='https://img.gamepix.com/games/prism-match-3d/icon/prism-match-3d.png';">
                    </div>
                    <div class="game-title">${game.title}</div>
                `;
                gridContainer.appendChild(card);
            });
        }

        function searchGamesEngine() {
            const keyword = document.getElementById('searchBar').value.toLowerCase().trim();
            const sectionTitle = document.getElementById('currentSectionTitle');

            if (keyword === "") {
                renderGamesGrid();
                return;
            }

            const matches = globalGamesDatabase.filter(game => {
                const t = game.title || "";
                return t.toLowerCase().includes(keyword);
            });

            sectionTitle.innerText = `Hasil Pencarian: "${keyword}" (${matches.length} Ditemukan)`;
            renderGamesGrid(matches);
        }

        function loadFallbackDatabase() {
            globalGamesDatabase = [
                { id: "prism-match-3d", title: "Prism Match 3D", category: "puzzle", url: "https://play.gamepix.com/prism-match-3d/embed?sid=1", image: "https://img.gamepix.com/games/prism-match-3d/icon/prism-match-3d.png" },
                { id: "merge-cakes", title: "Merge Cakes", category: "kids", url: "https://play.gamepix.com/merge-cakes/embed?sid=1", image: "https://img.gamepix.com/games/merge-cakes/icon/merge-cakes.png" }
            ];
            buildCategoriesMenu();
            renderGamesGrid();
        }

        fetchGamesFromOfficialFeed(1, false);
    </script>

</body>
</html>
