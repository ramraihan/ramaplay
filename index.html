<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rama Play</title>
    <style>
        :root {
            --bg-body: #f4f7f6;
            --bg-card: #ffffff;
            --text-main: #1a202c;
            --text-muted: #718096;
            --border-color: #edf2f7;
            --header-shadow: rgba(0,0,0,0.04);
        }

        /* Tema Mode Gelap Premium */
        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --header-shadow: rgba(0,0,0,0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            padding-bottom: 60px;
            min-height: 100vh;
        }

        /* Header Bersih dengan Tombol Mode Gelap di Kanan Atas */
        .main-header {
            background-color: var(--bg-card);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 10px var(--header-shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo {
            font-size: 22px;
            font-weight: 800;
            color: #00a3e0;
        }

        .theme-toggle-btn {
            background: #00a3e0;
            color: #ffffff;
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 10px rgba(0, 163, 224, 0.2);
        }

        .theme-toggle-btn:hover {
            background: #008cc2;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px;
        }

        /* Input Pencarian Minimalis */
        .search-container {
            margin: 15px 0;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            outline: none;
            background-color: var(--bg-card);
            color: var(--text-main);
        }

        .search-input:focus {
            border-color: #00a3e0;
            box-shadow: 0 0 0 3px rgba(0, 163, 224, 0.15);
        }

        /* Menu Kategori Geser Menyatu */
        .category-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 5px 0 15px 0;
            scrollbar-width: none;
        }

        .category-scroll::-webkit-scrollbar {
            display: none;
        }

        .category-item {
            background-color: var(--bg-card);
            color: var(--text-muted);
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 13.5px;
            font-weight: 700;
            border: 1px solid var(--border-color);
            cursor: pointer;
            white-space: nowrap;
        }

        .category-item:hover {
            border-color: #00a3e0;
            color: #00a3e0;
        }

        .category-item.active {
            background: #00a3e0;
            color: #ffffff;
            border-color: #00a3e0;
            box-shadow: 0 4px 12px rgba(0, 163, 224, 0.2);
        }

        .status-text {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-muted);
            margin: 10px 0 20px 5px;
        }

        /* Grid Game Bersih Sesuai UI Premium */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        @media (min-width: 600px) {
            .games-grid { grid-template-columns: repeat(4, 1fr); }
        }
        @media (min-width: 900px) {
            .games-grid { grid-template-columns: repeat(6, 1fr); }
        }

        /* Card Game Modern Tanpa Garis Tebal */
        .game-card {
            background-color: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            padding: 8px;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            cursor: pointer;
        }

        .game-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            border-color: #00a3e0;
        }

        .img-box {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 12px;
            overflow: hidden;
            background: #e2e8f0;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .game-title {
            font-size: 12px;
            font-weight: 700;
            margin-top: 8px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .loader {
            text-align: center;
            font-size: 16px;
            color: #00a3e0;
            padding: 40px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="main-header">
        <div class="header-logo">🎮 Rama Play</div>
        <button class="theme-toggle-btn" onclick="toggleTheme()" id="themeBtn">🌙 Gelap</button>
    </div>

    <div class="container">
        
        <div class="search-container">
            <input type="text" id="searchBar" class="search-input" placeholder="Cari game kesukaanmu di sini..." oninput="searchGames()">
        </div>

        <div class="category-scroll">
            <button class="category-item active" onclick="changeCategory('all', this)">Semua Game</button>
            <button class="category-item" onclick="changeCategory('arcade', this)">🕹️ Arkade</button>
            <button class="category-item" onclick="changeCategory('action', this)">⚔️ Aksi</button>
            <button class="category-item" onclick="changeCategory('adventure', this)">🤠 Petualangan</button>
            <button class="category-item" onclick="changeCategory('puzzle', this)">🧩 Puzzle</button>
            <button class="category-item" onclick="changeCategory('racing', this)">🏎️ Balapan</button>
            <button class="category-item" onclick="changeCategory('sports', this)">⚽ Olahraga</button>
            <button class="category-item" onclick="changeCategory('strategy', this)">🧠 Strategi</button>
            <button class="category-item" onclick="changeCategory('girls', this)">👑 Perempuan</button>
        </div>

        <div class="status-text" id="loadStatus">Menghubungkan ke GamePix...</div>
        
        <div class="games-grid" id="gamesContainer"></div>
        <div id="loadingIndicator" class="loader">Memuat katalog game...</div>

    </div>

    <script>
        let currentActiveCategory = 'all';
        let databaseGames = [];

        // FUNGSI LOGIKA MODE GELAP
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const btn = document.getElementById('themeBtn');
            
            if (currentTheme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                btn.innerHTML = '🌙 Gelap';
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                btn.innerHTML = '☀️ Terang';
                localStorage.setItem('theme', 'dark');
            }
        }

        // Pertahankan mode gelap jika halaman direfresh
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.getElementById('themeBtn').innerHTML = '☀️ Terang';
        }

        // AMBIL DATA BERDASARKAN VARIABEL ASLI (items, title, banner_image, url, category)
        async function loadGamePixFeed() {
            document.getElementById('loadingIndicator').style.display = 'block';
            
            // Menggunakan SID 1AAA1 milik Rama Play sesuai dokumentasi
            const rawFeedUrl = "https://feeds.gamepix.com/v2/json?sid=1AAA1&pagination=150&page=1";
            
            // Jembatan pemroses JSON AllOrigins yang telah dikonfigurasi agar bebas hambatan
            const stableProxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(rawFeedUrl)}&_=${new Date().getTime()}`;

            try {
                const response = await fetch(stableProxyUrl);
                const outerJson = await response.json();
                
                // Decode kiriman teks dari proxy menjadi objek data murni
                const jsonResult = JSON.parse(outerJson.contents);
                
                // MEMBACA TEPAT VARIABEL 'items' SESUAI SCREENSHOT ASLI
                let gameItems = jsonResult.items || [];

                if (gameItems.length === 0) {
                    document.getElementById('loadStatus').innerText = "Katalog game kosong atau SID salah.";
                    document.getElementById('loadingIndicator').style.display = 'none';
                    return;
                }

                databaseGames = gameItems;
                displayFilteredGames();

            } catch (err) {
                console.error("Gagal menarik data:", err);
                document.getElementById('loadStatus').innerText = "Koneksi dialihkan, mencoba jalur alternatif cepat...";
                
                // Jalur jembatan cadangan instan jika proxy utama sibuk
                try {
                    const fallbackResponse = await fetch("https://api.codetabs.com/v1/proxy?url=" + encodeURIComponent(rawFeedUrl));
                    const fallbackData = await fallbackResponse.json();
                    databaseGames = fallbackData.items || [];
                    displayFilteredGames();
                } catch(e) {
                    document.getElementById('loadStatus').innerText = "Server GamePix sibuk. Harap refresh halaman kembali.";
                    document.getElementById('loadingIndicator').style.display = 'none';
                }
            }
        }

        function displayFilteredGames() {
            const container = document.getElementById('gamesContainer');
            container.innerHTML = '';

            let filteredList = databaseGames;
            if (currentActiveCategory !== 'all') {
                filteredList = databaseGames.filter(game => {
                    // MEMBACA VARIABEL 'category' SESUAI SCREENSHOT ASLI
                    const gameCat = game.category ? game.category.toLowerCase() : '';
                    return gameCat === currentActiveCategory;
                });
            }

            if (filteredList.length === 0) {
                document.getElementById('loadingIndicator').style.display = 'none';
                document.getElementById('loadStatus').innerText = "Tidak ada game di kategori ini.";
                return;
            }

            document.getElementById('loadingIndicator').style.display = 'none';

            filteredList.forEach(game => {
                const card = document.createElement('div');
                card.className = "game-card";
                card.style.display = 'flex';
                
                // MEMBACA VARIABEL 'title' SESUAI SCREENSHOT ASLI
                const gameTitleText = game.title || 'Game Seru';
                card.setAttribute('data-name', gameTitleText.toLowerCase());
                
                // MEMBACA VARIABEL 'url' UNTUK MEMBUKA TAUTAN GAME
                card.onclick = () => { 
                    if(game.url) { window.location.href = game.url; }
                };

                // MEMBACA VARIABEL 'banner_image' ATAU CADANGAN 'image' UNTUK GAMBAR SAMPUL
                const imageSource = game.banner_image || game.image || 'https://via.placeholder.com/150';

                card.innerHTML = `
                    <div class="img-box">
                        <img src="${imageSource}" alt="${gameTitleText}" loading="lazy">
                    </div>
                    <div class="game-title">${gameTitleText}</div>
                `;
                container.appendChild(card);
            });

            const totalVisible = document.querySelectorAll('.game-card[style*="display: flex"]').length;
            document.getElementById('loadStatus').innerText = `Menampilkan ${totalVisible} game seru, siap dimainkan!`;
        }

        function searchGames() {
            const searchKeyword = document.getElementById('searchBar').value.toLowerCase().trim();
            const allCards = document.querySelectorAll('.game-card');
            
            allCards.forEach(card => {
                const name = card.getAttribute('data-name');
                card.style.display = name.includes(searchKeyword) ? 'flex' : 'none';
            });
            
            const totalVisible = document.querySelectorAll('.game-card[style*="display: flex"]').length;
            document.getElementById('loadStatus').innerText = `Ditemukan ${totalVisible} game yang cocok`;
        }

        function changeCategory(categoryName, element) {
            document.querySelectorAll('.category-item').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');

            currentActiveCategory = categoryName;
            document.getElementById('searchBar').value = '';
            displayFilteredGames();
        }

        // Jalankan program pembaca feed otomatis saat web diakses
        loadGamePixFeed();
    </script>

</body>
</html>
