<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rama Play - Premium Grid Station</title>
    <style>
        :root {
            --bg-body: #0b0f19;
            --bg-card: #151f32;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #22314d;
            --primary: #00a3e0;
            --accent: #ff4757;
        }

        [data-theme="light"] {
            --bg-body: #f4f7f6;
            --bg-card: #ffffff;
            --text-main: #1a202c;
            --text-muted: #718096;
            --border-color: #edf2f7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            padding-bottom: 80px;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        .main-header {
            background-color: var(--bg-card);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo {
            font-size: 26px;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0, 163, 224, 0.3);
        }

        .theme-toggle-btn {
            background: linear-gradient(135deg, var(--primary), #0077b6);
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 163, 224, 0.3);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .search-container {
            margin-bottom: 25px;
        }

        .search-input {
            width: 100%;
            padding: 16px 22px;
            border: 2px solid var(--border-color);
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            outline: none;
            background-color: var(--bg-card);
            color: var(--text-main);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 163, 224, 0.2);
        }

        /* SUSUNAN MENU KATEGORI DI ATAS (PREMIUM BUTTONS) */
        .categories-nav-container {
            margin-bottom: 30px;
            padding: 5px 0;
        }

        .nav-title {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 12px;
            color: var(--primary);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .categories-tabs {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: none;
        }

        .categories-tabs::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            background-color: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .tab-btn.active, .tab-btn:hover {
            background: linear-gradient(135deg, var(--primary), #0077b6);
            color: #ffffff;
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(0, 163, 224, 0.25);
            transform: translateY(-2px);
        }

        .section-header-title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: capitalize;
        }

        .section-header-title::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 24px;
            background-color: var(--primary);
            border-radius: 3px;
        }

        /* SUSUNAN STRUKTUR GRID TIGA KANAN BAWAH PAS DI HP */
        .games-grid-main {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        @media (min-width: 768px) {
            .games-grid-main {
                grid-template-columns: repeat(4, 1fr);
                gap: 16px;
            }
        }

        @media (min-width: 1024px) {
            .games-grid-main {
                grid-template-columns: repeat(6, 1fr);
                gap: 20px;
            }
        }

        .game-card {
            background-color: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            padding: 8px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.12);
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 8px 16px rgba(0, 163, 224, 0.2);
        }

        .img-box {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 12px;
            overflow: hidden;
            background: #1e293b;
            position: relative;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .game-title {
            font-size: 11px;
            font-weight: 700;
            margin-top: 8px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-main);
            padding: 0 2px;
        }

        .status-text {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 20px;
        }
    </style>
</head>

        let selectedCategory = "semua";

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const btn = document.getElementById('themeBtn');
            if (currentTheme === 'light') {
                document.documentElement.removeAttribute('data-theme');
                btn.innerHTML = '☀️ Terang';
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                btn.innerHTML = '🌙 Gelap';
                localStorage.setItem('theme', 'light');
            }
        }

        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            document.getElementById('themeBtn').innerHTML = '🌙 Gelap';
        }

        // MEMBUAT MENU TOMBOL KATEGORI DI ATAS HALAMAN
        function buildCategoriesMenu() {
            const tabsContainer = document.getElementById('categoriesTabsContainer');
            tabsContainer.innerHTML = '';

            const rawCategories = globalGamesDatabase.map(game => game.CATEGORY);
            const cleanCategories = ["semua", ...new Set(rawCategories)];

            cleanCategories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${selectedCategory === cat ? 'active' : ''}`;
                
                let label = cat.toUpperCase();
                if(cat === "semua") label = "📱 SEMUA";
                if(cat === "match-3") label = "🧩 MATCH-3";
                if(cat === "arcade") label = "🕹️ ARCADE";
                if(cat === "action") label = "⚔️ ACTION";
                if(cat === "adventure") label = "🤠 ADVENTURE";
                if(cat === "racing") label = "🏎️ RACING";
                if(cat === "sports") label = "⚽ SPORTS";
                if(cat === "strategy") label = "🧠 STRATEGY";

                btn.innerText = label;
                btn.onclick = () => {
                    selectedCategory = cat;
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById('searchBar').value = ""; // Reset pencarian jika ganti kategori
                    renderGamesGrid();
                };
                tabsContainer.appendChild(btn);
            });
        }

        // RENDER DAN FILTER GAME BERDASARKAN GRID 3-KOLOM
        function renderGamesGrid(gamesToDisplay = null) {
            const gridContainer = document.getElementById('gamesGridContainer');
            const sectionTitle = document.getElementById('currentSectionTitle');
            gridContainer.innerHTML = '';

            let targetGames = gamesToDisplay;
            
            if (!targetGames) {
                if (selectedCategory === "semua") {
                    targetGames = globalGamesDatabase;
                    sectionTitle.innerText = "Semua Game Premium";
                } else {
                    targetGames = globalGamesDatabase.filter(game => game.CATEGORY === selectedCategory);
                    sectionTitle.innerText = `Kategori: ${selectedCategory}`;
                }
            }

            if (targetGames.length === 0) {
                gridContainer.innerHTML = `<div style="grid-column: span 3; text-align: center; color: var(--text-muted); padding: 40px; font-weight: bold;">Game tidak ditemukan...</div>`;
                return;
            }

            targetGames.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                
                card.onclick = () => {
                    window.location.href = game.URL;
                };

                card.innerHTML = `
                    <div class="img-box">
                        <img src="${game.Icon}" alt="${game.Title}" loading="lazy" onerror="this.onerror=null; this.src='https://img.gamepix.com/games/prism-match-3d/icon/prism-match-3d.png?w=105';">
                    </div>
                    <div class="game-title">${game.Title}</div>
                `;
                gridContainer.appendChild(card);
            });

            document.getElementById('loadStatus').innerText = `Menampilkan ${targetGames.length} Game Premium dalam Susunan Grid`;
        }

        // ENGINE PENCARIAN REALTIME DI DALAM GRID
        function searchGamesEngine() {
            const keyword = document.getElementById('searchBar').value.toLowerCase().trim();
            const sectionTitle = document.getElementById('currentSectionTitle');

            if (keyword === "") {
                // Kembalikan ke filter kategori aktif jika kolom pencarian kosong
                renderGamesGrid();
                return;
            }

            sectionTitle.innerText = `Hasil Pencarian: "${keyword}"`;
            const matches = globalGamesDatabase.filter(game => game.Title.toLowerCase().includes(keyword));
            renderGamesGrid(matches);
        }

        // AKSI JALANKAN APLIKASI UTAMA
        buildCategoriesMenu();
        renderGamesGrid();
    </script>

</body>
</html>
