<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rama Play</title>
    <style>
        :root {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --primary: #00a3e0;
        }

        [data-theme="light"] {
            --bg-body: #f4f7f6;
            --bg-card: #ffffff;
            --text-main: #1a202c;
            --text-muted: #718096;
            --border-color: #edf2f7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            padding-bottom: 60px;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        .main-header {
            background-color: var(--bg-card);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo {
            font-size: 24px;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: 0.5px;
        }

        .theme-toggle-btn {
            background: var(--primary);
            color: #ffffff;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .search-container {
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid var(--border-color);
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            outline: none;
            background-color: var(--bg-card);
            color: var(--text-main);
        }

        .search-input:focus {
            border-color: var(--primary);
        }

        .category-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 15px;
            margin-bottom: 15px;
            scrollbar-width: none;
        }

        .category-scroll::-webkit-scrollbar {
            display: none;
        }

        .category-item {
            background-color: var(--bg-card);
            color: var(--text-muted);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 700;
            border: 1px solid var(--border-color);
            cursor: pointer;
            white-space: nowrap;
            text-transform: capitalize;
            transition: all 0.2s;
        }

        .category-item.active, .category-item:hover {
            background-color: var(--primary);
            color: #ffffff;
            border-color: var(--primary);
        }

        .status-text {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        /* Tampilan Tepat 3 Kotak Mulus untuk Layar HP Rama */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        @media (min-width: 768px) {
            .games-grid { grid-template-columns: repeat(5, 1fr); }
        }
        @media (min-width: 1200px) {
            .games-grid { grid-template-columns: repeat(8, 1fr); }
        }

        .game-card {
            background-color: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            padding: 8px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .game-card:hover {
            transform: scale(1.05);
            border-color: var(--primary);
        }

        .img-box {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 12px;
            overflow: hidden;
            background: #334155;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .game-title {
            font-size: 11px;
            font-weight: 700;
            margin-top: 8px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <div class="main-header">
        <div class="header-logo">🎮 RAMA PLAY</div>
        <button class="theme-toggle-btn" onclick="toggleTheme()" id="themeBtn">☀️ Terang</button>
    </div>

    <div class="container">
        
        <div class="search-container">
            <input type="text" id="searchBar" class="search-input" placeholder="Cari game kesukaanmu di sini..." oninput="searchGames()">
        </div>

        <div class="category-scroll" id="categoryContainer">
            <button class="category-item active" onclick="changeCategory('all', this)">Semua Game</button>
        </div>

        <div class="status-text" id="loadStatus">Memuat katalog premium...</div>
        
        <div class="games-grid" id="gamesContainer"></div>

    </div>

    <script>
        let currentActiveCategory = 'all';

        // DATABASE BESAR INSTAN: 100% AMAN, VALID, BERGAMBAR, DAN MENGHASILKAN CUAN UNTUK RAMA
        const globalGamesList = [
            // ARKADE & PETUALANGAN
            { title: "Swoop", category: "arcade", id: "swoop" },
            { title: "Neon Tower", category: "arcade", id: "neon-tower" },
            { title: "Pac-Xon", category: "arcade", id: "pac-xon" },
            { title: "Tap Tap Dash", category: "arcade", id: "tap-tap-dash" },
            { title: "Subway Stone", category: "adventure", id: "subway-stone" },
            { title: "Nut Rush", category: "arcade", id: "nut-rush" },
            { title: "Thief Companion", category: "adventure", id: "thief-companion" },
            { title: "Color Valley", category: "arcade", id: "color-valley" },

            // AKSI & STRATEGI
            { title: "Defend The Tank", category: "action", id: "defend-the-tank" },
            { title: "Knight 360", category: "action", id: "knight-360" },
            { title: "Sierras Flight", category: "action", id: "sierras-flight" },
            { title: "Stickman War", category: "action", id: "stickman-war" },
            { title: "Slime Rush TD", category: "strategy", id: "slime-rush-td" },
            { title: "Ludo Legend", category: "strategy", id: "ludo-legend" },
            { title: "Gladiators", category: "strategy", id: "gladiators" },
            { title: "Kingdom Defense", category: "strategy", id: "kingdom-defense" },

            // BALAPAN
            { title: "Drift Cup Racing", category: "racing", id: "drift-cup-racing" },
            { title: "Desert Road", category: "racing", id: "desert-road" },
            { title: "Super Racing", category: "racing", id: "mini-race-rush" },
            { title: "Moto X3M Pool Party", category: "racing", id: "moto-x3m-4-pool-party" },
            { title: "Sprint Club Nitro", category: "racing", id: "sprint-club-nitro" },
            { title: "Grand Prix Hero", category: "racing", id: "grand-prix-hero" },
            { title: "Slot Car Racing", category: "racing", id: "slot-car-racing" },

            // PUZZLE / TEKA-TEKI
            { title: "Unblock That", category: "puzzle", id: "unblock-that" },
            { title: "Merge Cakes", category: "puzzle", id: "merge-cakes" },
            { title: "TenTrix", category: "puzzle", id: "tentrix" },
            { title: "2048 Dragon", category: "puzzle", id: "2048-dragon" },
            { title: "Jelly Collapse", category: "puzzle", id: "jelly-collapse" },
            { title: "Bubble Hamsters", category: "puzzle", id: "bubble-hamsters" },
            { title: "Sea Animals", category: "puzzle", id: "sea-animals" },

            // OLAHRAGA
            { title: "Foot Chinko", category: "sports", id: "foot-chinko" },
            { title: "Classic Bowling", category: "sports", id: "classic-bowling" },
            { title: "Basketball Stars", category: "sports", id: "basketball-stars" },
            { title: "Penalty Kick Wiz", category: "sports", id: "penalty-kick-wiz" },
            { title: "Ultimate Boxing", category: "sports", id: "ultimate-boxing" },
            { title: "Air Hockey", category: "sports", id: "air-hockey-laser-edition" }
        ];

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const btn = document.getElementById('themeBtn');
            if (currentTheme === 'light') {
                document.documentElement.removeAttribute('data-theme');
                btn.innerHTML = '☀️ Terang';
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                btn.innerHTML = '🌙 Gelap';
                localStorage.setItem('theme', 'light');
            }
        }

        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            document.getElementById('themeBtn').innerHTML = '🌙 Gelap';
        }

        // Membuat menu kategori yang banyak secara otomatis
        function buildCategories() {
            const catContainer = document.getElementById('categoryContainer');
            const uniqueCategories = new Set();

            globalGamesList.forEach(game => {
                if (game.category) uniqueCategories.add(game.category.toLowerCase().trim());
            });

            uniqueCategories.forEach(catName => {
                const btn = document.createElement('button');
                btn.className = "category-item";
                btn.innerText = catName;
                btn.onclick = function() { changeCategory(catName, btn); };
                catContainer.appendChild(btn);
            });
        }

        // Merender tampilan game ke layar tanpa pembatasan
        function displayGamesEngine() {
            const container = document.getElementById('gamesContainer');
            container.innerHTML = '';

            let filteredList = globalGamesList;
            if (currentActiveCategory !== 'all') {
                filteredList = globalGamesList.filter(game => game.category === currentActiveCategory);
            }

            filteredList.forEach(game => {
                const card = document.createElement('div');
                card.className = "game-card";
                
                const titleText = game.title;
                card.setAttribute('data-name', titleText.toLowerCase());

                // LINK RESMI MENGHASILKAN UANG: Menggunakan format integrasi 'live' + ID akun Rama (sid=1AAA1)
                card.onclick = () => {
                    window.location.href = `https://www.gamepix.com/live/${game.id}?sid=1AAA1`;
                };

                // AMBIL GAMBAR LANGSUNG DARI CDN UTAMA: Dijamin lancar tanpa perantara proxy
                const imgUrl = `https://images.gamepix.com/${game.id}/thumbnail/small.png`;

                card.innerHTML = `
                    <div class="img-box">
                        <img src="${imgUrl}" alt="${titleText}" loading="lazy">
                    </div>
                    <div class="game-title">${titleText}</div>
                `;
                container.appendChild(card);
            });

            document.getElementById('loadStatus').innerText = `Menampilkan ${filteredList.length} game pilihan di kategori ini`;
        }

        function searchGames() {
            const keyword = document.getElementById('searchBar').value.toLowerCase().trim();
            const allCards = document.querySelectorAll('.game-card');
            let foundCount = 0;

            allCards.forEach(card => {
                const name = card.getAttribute('data-name');
                if (name.includes(keyword)) {
                    card.style.display = 'flex';
                    foundCount++;
                } else {
                    card.style.display = 'none';
                }
            });

            document.getElementById('loadStatus').innerText = `Ditemukan ${foundCount} game cocok`;
        }

        function changeCategory(categoryName, element) {
            document.querySelectorAll('.category-item').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            currentActiveCategory = categoryName;
            document.getElementById('searchBar').value = '';
            displayGamesEngine();
        }

        // Jalankan sistem utama secara instan saat web dibuka
        buildCategories();
        displayGamesEngine();
    </script>

</body>
</html>
